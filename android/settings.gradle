rootProject.name = 'WellnessPlus'

pluginManagement { includeBuild('../node_modules/@react-native/gradle-plugin') }
plugins { id("com.facebook.react.settings") }

extensions.configure(com.facebook.react.ReactSettingsExtension) { ex ->
    ex.autolinkLibrariesFromCommand()
}

include ':app'

// react-native-vector-icons is autolinked via the command above on RN
// 0.74+ (no manual settings.gradle entry needed, unlike older RN
// versions) — see app/build.gradle's project.ext.vectoricons block for
// the one manual step this package still requires: font asset copying.
